{% comment %} Kuphuka Chat Widget — paste just before </body> in theme.liquid {% endcomment %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  #kup-widget * { box-sizing: border-box; margin: 0; padding: 0; }
  #kup-widget {
    position: fixed;
    bottom: 34px;
    right: 24px;
    z-index: 9999;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #kup-widget.kup-visible { opacity: 1; pointer-events: auto; }
  #kup-btn {
    width: 56px; height: 56px; border-radius: 50%;
    background: transparent; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s; margin-left: auto;
  }
  #kup-btn:hover { transform: scale(1.07); }
  #kup-btn svg { width: 52px; height: 52px; transition: opacity 0.2s; }
  #kup-btn .kup-icon-close { display: none; }
  #kup-widget.kup-open #kup-btn .kup-icon-chat { display: none; }
  #kup-widget.kup-open #kup-btn .kup-icon-close { display: block; }
  #kup-panel {
    display: none; flex-direction: column;
    width: 360px; height: 520px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 16px 56px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.04);
    overflow: hidden; margin-bottom: 12px;
  }
  #kup-widget.kup-open #kup-panel { display: flex; }
  #kup-header {
    background: linear-gradient(135deg, #1e5c39 0%, #2a7d4f 100%);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  #kup-header-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    overflow: hidden; flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  #kup-header-avatar img {
    width: 100%; height: 100%; object-fit: cover;
    object-position: center top; display: block;
  }
  #kup-header-title {
    color: white;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 14.5px; font-weight: 600; flex: 1;
    letter-spacing: -0.1px;
  }
  #kup-header-sub {
    color: rgba(255,255,255,0.72);
    font-size: 10.5px; margin-top: 2px;
    font-weight: 300; letter-spacing: 0.2px;
  }
  #kup-header-status {
    display: flex; align-items: center; gap: 5px;
  }
  #kup-header-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #7ee8a2; flex-shrink: 0;
    animation: kup-status-pulse 2.5s ease-in-out infinite;
  }
  @keyframes kup-status-pulse {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.5;transform:scale(0.85)}
  }
  #kup-messages {
    flex: 1; overflow-y: auto; padding: 16px 14px;
    display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
  }
  #kup-messages::-webkit-scrollbar { width: 4px; }
  #kup-messages::-webkit-scrollbar-thumb { background: #c8e6d4; border-radius: 4px; }
  .kup-msg {
    max-width: 82%; padding: 10px 14px; border-radius: 18px;
    font-size: 13.5px; line-height: 1.55; word-break: break-word;
  }
  .kup-msg a { color: #2a7d4f; }
  .kup-msg-bot {
    background: #f0f6f2; color: #1a1a1a;
    border-bottom-left-radius: 4px; align-self: flex-start;
  }
  .kup-msg-user {
    background: linear-gradient(135deg, #2a7d4f, #1e5c39);
    color: white; border-bottom-right-radius: 4px; align-self: flex-end;
    margin-left: 40px !important; margin-right: 4px !important;
    padding-left: 16px !important; padding-right: 16px !important;
  }
  #kup-typing {
    display: none; align-self: flex-start; background: #f0f6f2;
    border-radius: 18px; border-bottom-left-radius: 4px; padding: 10px 14px;
  }
  #kup-typing span {
    display: inline-block; width: 7px; height: 7px; background: #2a7d4f;
    border-radius: 50%; margin: 0 2px; animation: kup-bounce 1.2s infinite;
  }
  #kup-typing span:nth-child(2) { animation-delay: 0.2s; }
  #kup-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes kup-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
  #kup-input-area {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px; border-top: 1px solid #e8f0eb; flex-shrink: 0;
    background: white;
  }
  #kup-input {
    flex: 1; border: 1.5px solid #c8e0d2; border-radius: 22px;
    padding: 9px 14px; font-size: 13.5px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #f8fbf9; color: #1a1a1a; font-family: inherit;
  }
  #kup-input:focus {
    border-color: #2a7d4f; background: #fff;
    box-shadow: 0 0 0 3px rgba(42,125,79,0.08);
  }
  #kup-input::placeholder { color: #b0b0b0; }
  #kup-send {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #2a7d4f, #1e5c39);
    border: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(42,125,79,0.35);
  }
  #kup-send:hover { opacity: 0.9; transform: scale(1.05); }
  #kup-send:disabled { opacity: 0.45; cursor: default; transform: none; box-shadow: none; }
  #kup-send svg { width: 18px; height: 18px; fill: white; }
  #kup-mic {
    width: 38px; height: 38px; border-radius: 50%;
    background: transparent; border: 1.5px solid #2a7d4f;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  #kup-mic:hover { background: rgba(42,125,79,0.08); transform: scale(1.05); }
  #kup-mic svg { width: 16px; height: 16px; fill: #2a7d4f; }
  #kup-mic.kup-mic-recording {
    background: #fff0f0; border-color: #e53e3e;
    animation: kup-pulse 1s infinite;
  }
  #kup-mic.kup-mic-recording svg { fill: #e53e3e; }
  #kup-mic:disabled { opacity: 0.4; cursor: default; transform: none; }
  @keyframes kup-pulse {
    0%,100%{box-shadow:0 0 0 0 rgba(229,62,62,0.3)}
    50%{box-shadow:0 0 0 5px rgba(229,62,62,0)}
  }
  #kup-call {
    width: 38px; height: 38px; border-radius: 50%;
    background: transparent; border: 1.5px solid #2a7d4f;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
  }
  #kup-call:hover { background: rgba(42,125,79,0.08); transform: scale(1.05); }
  #kup-call svg { width: 15px; height: 15px; fill: #2a7d4f; transition: fill 0.2s; }
  #kup-call.kup-call-active { background: #e53e3e; border-color: #e53e3e; animation: kup-pulse 1.5s infinite; }
  #kup-call.kup-call-active svg { fill: white; }
  #kup-call:disabled { opacity: 0.4; cursor: default; transform: none; }
  @media (max-width: 420px) {
    #kup-widget { bottom: 26px; right: 16px; left: 16px; }
    #kup-panel { width: 100%; height: 480px; }
    #kup-btn { margin-left: auto; }
    #kup-input { font-size: 16px; }
  }
</style>

<div id="kup-widget">
  <div id="kup-panel">
    <div id="kup-header">
      <div id="kup-header-avatar">
        <img src="https://cdn.shopify.com/s/files/1/0604/8763/0948/files/ChatGPT_Image_Oct_11_2025_02_16_32_PM.png?v=1760214765" alt="Asistente">
      </div>
      <div>
        <div id="kup-header-title">Asistente Kuphuka</div>
        <div id="kup-header-sub">Responde al instante</div>
      </div>
      <div id="kup-header-status"><div id="kup-header-dot"></div></div>
    </div>
    <div id="kup-messages">
      <div id="kup-typing"><span></span><span></span><span></span></div>
    </div>
    <div id="kup-input-area">
      <input id="kup-input" type="text" placeholder="Escribe o habla..." autocomplete="off" />
      <button id="kup-call" aria-label="Iniciar llamada">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </button>
      <button id="kup-mic" aria-label="Hablar">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1.5 4a1.5 1.5 0 0 0-1.5 1.5v5a1.5 1.5 0 0 0 3 0V6.5A1.5 1.5 0 0 0 10.5 5zM3 11a1 1 0 0 1 2 0 7 7 0 0 0 14 0 1 1 0 1 1 2 0 9 9 0 0 1-8 8.94V22h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-2.06A9 9 0 0 1 3 11z"/></svg>
      </button>
      <button id="kup-send" aria-label="Enviar">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
  <button id="kup-btn" aria-label="Abrir asistente Kuphuka">
    <svg class="kup-icon-chat" viewBox="0 0 24 24" fill="none" stroke="#2a7d4f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37C8.42 21.5 10.15 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/><text x="12" y="17.5" text-anchor="middle" font-size="14" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" fill="#2a7d4f" stroke="none">?</text></svg>
    <svg class="kup-icon-close" viewBox="0 0 24 24" fill="none" stroke="#2a7d4f" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<script>
(function () {
  var API_URL = 'https://kuphuka-chatbot.vercel.app/api/chat';
  var TTS_URL = 'https://kuphuka-chatbot.vercel.app/api/tts';
  var GREETING = '¡Hola! Soy el asistente de Kuphuka 👋 Puedo ayudarte con dudas sobre el producto, ingredientes, envíos o suscripciones. ¿Qué te gustaría saber?';

  var widget = document.getElementById('kup-widget');
  var btn = document.getElementById('kup-btn');
  var messagesEl = document.getElementById('kup-messages');
  var typingEl = document.getElementById('kup-typing');
  var inputEl = document.getElementById('kup-input');
  var sendBtn = document.getElementById('kup-send');
  var micBtn = document.getElementById('kup-mic');
  var callBtn = document.getElementById('kup-call');

  var history = [];
  var greeted = false;
  var sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  var callMode = false;
  var isSpeaking = false;
  var ambientSource = null;
  var ambientGain = null;
  var typingTimeout = null;

  setTimeout(function () {
    widget.classList.add('kup-visible');
  }, 10000);

  function linkify(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function addMessage(text, role) {
    var div = document.createElement('div');
    div.className = 'kup-msg ' + (role === 'user' ? 'kup-msg-user' : 'kup-msg-bot');
    div.innerHTML = linkify(text);
    messagesEl.insertBefore(div, typingEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setLoading(on) {
    typingEl.style.display = on ? 'flex' : 'none';
    sendBtn.disabled = on;
    inputEl.disabled = on;
    micBtn.disabled = on;
    if (on) messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // AudioContext — unlocked on first user gesture, works on iOS Safari
  var audioCtx = null;

  function unlockAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  // Returns a Promise that resolves when audio finishes playing
  async function playAudio(base64Audio) {
    return new Promise(async function(resolve) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        var binary = atob(base64Audio);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        var audioBuffer = await audioCtx.decodeAudioData(bytes.buffer.slice(0));
        var source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioCtx.destination);
        source.onended = resolve;
        source.start(0);
      } catch (e) {
        console.log('Audio playback error:', e);
        resolve();
      }
    });
  }

  // --- Ambient call-centre sound (synthesised — no external files) ---
  function startAmbient() {
    if (!audioCtx) return;
    // Brown-noise room tone
    var sr = audioCtx.sampleRate;
    var buf = audioCtx.createBuffer(1, sr * 4, sr);
    var d = buf.getChannelData(0);
    var b0=0,b1=0,b2=0;
    for (var i=0;i<d.length;i++){
      var w=Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759; b2=0.969*b2+w*0.153852;
      d[i]=(b0+b1+b2)*0.035;
    }
    ambientSource = audioCtx.createBufferSource();
    ambientSource.buffer = buf; ambientSource.loop = true;
    ambientGain = audioCtx.createGain(); ambientGain.gain.value = 0.018;
    var filt = audioCtx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=700; filt.Q.value=0.7;
    ambientSource.connect(filt); filt.connect(ambientGain); ambientGain.connect(audioCtx.destination);
    ambientSource.start();
    scheduleTyping();
  }

  function stopAmbient() {
    if (ambientSource) { try { ambientSource.stop(); } catch(e){} ambientSource = null; }
    if (typingTimeout) { clearTimeout(typingTimeout); typingTimeout = null; }
  }

  function scheduleTyping() {
    if (!callMode) return;
    typingTimeout = setTimeout(function() {
      if (!callMode || isSpeaking) { scheduleTyping(); return; }
      var n = 3 + Math.floor(Math.random() * 7);
      for (var k=0; k<n; k++) {
        (function(off) {
          setTimeout(function() {
            if (!audioCtx) return;
            var cb = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate*0.022), audioCtx.sampleRate);
            var cd = cb.getChannelData(0);
            for (var j=0;j<cd.length;j++) cd[j]=(Math.random()*2-1)*Math.exp(-j/(audioCtx.sampleRate*0.005));
            var cs = audioCtx.createBufferSource(); cs.buffer=cb;
            var cg = audioCtx.createGain(); cg.gain.value=0.03+Math.random()*0.025;
            cs.connect(cg); cg.connect(audioCtx.destination); cs.start();
          }, off);
        })(k*(55+Math.random()*75));
      }
      scheduleTyping();
    }, 2500 + Math.random() * 5000);
  }

  // Update header subtitle to reflect call state
  function setCallStatus(state) {
    var sub = document.getElementById('kup-header-sub');
    if (!sub) return;
    var map = { listening:'🎙 Escuchando...', thinking:'💭 Procesando...', speaking:'🔊 Respondiendo...', idle:'📞 En llamada' };
    sub.textContent = map[state] || 'Responde al instante';
  }

  // Start mic in call-mode loop
  function callListen() {
    if (!recognition || !callMode) return;
    inputEl.value = '';
    isRecording = true;
    micBtn.classList.add('kup-mic-recording');
    setCallStatus('listening');
    try { recognition.start(); } catch(e) {
      isRecording = false;
      micBtn.classList.remove('kup-mic-recording');
      setTimeout(callListen, 600);
    }
  }

  // Correct phonetic variants of "Kuphuka" that speech recognition may produce
  function fixBrandName(text) {
    return text
      // Full phonetic variants: kufuka, ku fuka, ku fu ka, cuphuca, cofuca, etc.
      .replace(/(ku|cu|ko|co)[\s\-]?(f|ph)(u|o|a)[\s\-]?(k|c)(a|o)/gi, 'Kuphuka')
      // iOS garbled short forms: KFK, CFCA, CFK, KFKA, KFC+vowel, etc.
      .replace(/\b[ck][\s\-]?f[\s\-]?[ck][ao]?\b/gi, 'Kuphuka')
      // Spelled out with spaces: K U F U K A
      .replace(/\bk[\s]u[\s]f[\s]u[\s]k[\s]?a?\b/gi, 'Kuphuka')
      // iOS "Kung Fu" variants: Kung Fu Ka, Kung Fu Ca, Kung Fu Uca, Kung Fuka, etc.
      .replace(/kung[\s\-]?fu[\s\-]?(u?[ck]a?|uca|ka|ca)\b/gi, 'Kuphuka');
  }

  // Speech recognition setup
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  var recognition = null;
  var isRecording = false;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'es-ES';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onresult = function(event) {
      var transcript = '';
      for (var i = event.resultIndex; i < event.results.length; i++) {
        transcript += event.results[i][0].transcript;
      }
      inputEl.value = fixBrandName(transcript);
    };

    recognition.onend = function() {
      isRecording = false;
      micBtn.classList.remove('kup-mic-recording');
      var text = inputEl.value.trim();
      if (text) {
        sendMessage();
      } else if (callMode) {
        setTimeout(callListen, 400); // no speech detected — listen again
      }
    };

    recognition.onerror = function(e) {
      isRecording = false;
      micBtn.classList.remove('kup-mic-recording');
      console.log('Speech recognition error:', e.error);
      if (callMode && e.error !== 'aborted') setTimeout(callListen, 800);
    };
  } else {
    micBtn.style.display = 'none'; // hide mic if browser doesn't support it
  }

  micBtn.addEventListener('click', function() {
    if (!recognition) return;
    if (isRecording) {
      recognition.stop();
    } else {
      inputEl.value = '';
      inputEl.placeholder = 'Escuchando...';
      isRecording = true;
      micBtn.classList.add('kup-mic-recording');
      recognition.start();
    }
  });

  async function sendMessage() {
    if (!callMode) inputEl.placeholder = 'Escribe o habla...';
    var text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    addMessage(text, 'user');
    history.push({ role: 'user', content: text });
    setLoading(true);
    if (callMode) setCallStatus('thinking');
    try {
      var res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, sessionId: sessionId })
      });
      if (!res.ok) throw new Error('Network error');
      var data = await res.json();
      var reply = data.message || 'Lo siento, ha habido un error. Por favor escríbenos a info@kuphuka.com.';
      history.push({ role: 'assistant', content: reply });
      addMessage(reply, 'bot');
      if (data.audio) {
        isSpeaking = true;
        if (callMode) setCallStatus('speaking');
        await playAudio(data.audio);
        isSpeaking = false;
        if (callMode) callListen();
      } else if (callMode) {
        setTimeout(callListen, 400);
      }
    } catch (e) {
      addMessage('Lo siento, no he podido conectar. Por favor inténtalo de nuevo o escríbenos a info@kuphuka.com.', 'bot');
      if (callMode) setTimeout(callListen, 1000);
    }
    setLoading(false);
    if (!callMode) inputEl.focus();
  }

  var GREETING_TTS = 'Hola, soy el asistente de Kufuka. ¿En qué puedo ayudarte hoy?';

  btn.addEventListener('click', function () {
    unlockAudio();
    widget.classList.toggle('kup-open');
    if (widget.classList.contains('kup-open') && !greeted) {
      greeted = true;
      // Fetch greeting audio in parallel with the typing delay
      var greetingAudioPromise = fetch(TTS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: GREETING_TTS })
      }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });

      addMessage(GREETING, 'bot');
      inputEl.focus();
      greetingAudioPromise.then(async function(data) {
        if (data && data.audio) {
          isSpeaking = true;
          await playAudio(data.audio);
          isSpeaking = false;
          if (callMode) callListen();
        }
      });
    }
  });

  callBtn.addEventListener('click', function() {
    if (!recognition) return;
    unlockAudio();
    callMode = !callMode;
    if (callMode) {
      callBtn.classList.add('kup-call-active');
      inputEl.disabled = true;
      sendBtn.style.visibility = 'hidden';
      startAmbient();
      setCallStatus('idle');
      // If greeting already played, start listening immediately
      if (greeted && !isSpeaking) callListen();
    } else {
      callBtn.classList.remove('kup-call-active');
      inputEl.disabled = false;
      inputEl.placeholder = 'Escribe o habla...';
      sendBtn.style.visibility = '';
      stopAmbient();
      setCallStatus(null);
      if (isRecording) { try { recognition.stop(); } catch(e){} }
    }
  });

  sendBtn.addEventListener('click', function() { unlockAudio(); sendMessage(); });
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); unlockAudio(); sendMessage(); }
  });

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', function () {
      var panel = document.getElementById('kup-panel');
      var availableHeight = window.visualViewport.height - 110;
      panel.style.height = Math.min(520, Math.max(200, availableHeight)) + 'px';
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }
})();
</script>
